name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run Dockerized Go checks
        run: docker build --target test .

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build image
        run: docker build .

  ios:
    name: iOS Tests
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build test-mode server
        run: CGO_ENABLED=0 go build -o "$RUNNER_TEMP/tagnote-server" ./cmd/tagnote-server

      - name: Start test-mode server
        env:
          JWT_SECRET: ios-ci-secret
          TAGNOTE_TEST_MODE: "1"
          ADMIN_EMAIL: test@test.com
          OPERATIONAL_BEARER_TOKEN: ios-ci-token
        run: |
          mkdir -p "$RUNNER_TEMP/tagnote-data"
          "$RUNNER_TEMP/tagnote-server" \
            -addr :3777 \
            -db "$RUNNER_TEMP/tagnote-data/tagnote.db" \
            > "$RUNNER_TEMP/server.log" 2>&1 &

          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3777/healthz >/dev/null; then exit 0; fi
            sleep 1
          done
          echo "server did not start"; cat "$RUNNER_TEMP/server.log"; exit 1

      - name: Select iPhone simulator
        id: sim
        run: |
          DEVICE_ID=$(xcrun simctl list devices available -j | python3 -c "import json,sys; d=json.load(sys.stdin); ids=[x['udid'] for rt,devs in d['devices'].items() if 'iOS' in rt for x in devs if x['name'].startswith('iPhone')]; print(ids[-1] if ids else '')")
          test -n "$DEVICE_ID" || { echo 'no iPhone simulator available'; exit 1; }
          echo "device_id=$DEVICE_ID" >> "$GITHUB_OUTPUT"

      - name: Run iOS unit + share E2E tests
        run: |
          xcodebuild test \
            -project ios/TagNote/TagNote.xcodeproj \
            -scheme TagNote \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.device_id }}" \
            -only-testing:TagNoteTests \
            -only-testing:TagNoteUITests/TagNoteE2ETests/testShareExtensionFromSafariCreatesNote \
            -resultBundlePath "$RUNNER_TEMP/ios-results.xcresult" \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

      - name: Upload iOS result bundle
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ios-results
          path: ${{ runner.temp }}/ios-results.xcresult
          if-no-files-found: ignore

  e2e:
    name: Frontend E2E
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build app image
        run: docker build -t tag-note:e2e .

      - name: Start app
        run: |
          docker run -d --rm \
            --name tag-note-e2e \
            -p 13777:3000 \
            -e JWT_SECRET=e2e-test-secret \
            -e TAGNOTE_TEST_MODE=1 \
            -e ADMIN_EMAIL=test@test.com \
            -e OPERATIONAL_BEARER_TOKEN=e2e-operational-token \
            -e GOOGLE_CLIENT_ID=web-e2e.apps.googleusercontent.com,ios-e2e.apps.googleusercontent.com \
            -e APPLE_CLIENT_ID=com.tag-note.tagnote,com.tag-note.web-e2e \
            -e APPLE_WEB_CLIENT_ID=com.tag-note.web-e2e \
            tag-note:e2e

          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:13777/healthz >/dev/null; then
              exit 0
            fi
            sleep 1
          done

          docker logs tag-note-e2e
          exit 1

      - name: Install E2E dependencies
        run: |
          docker run --rm \
            -e PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 \
            -e npm_config_cache=/tmp/.npm \
            -v "$PWD":/app \
            -w /app \
            mcr.microsoft.com/playwright:v1.60.0-noble \
            npm ci

      - name: Run E2E tests
        run: |
          docker run --rm \
            --network host \
            -e E2E_BASE_URL=http://127.0.0.1:13777 \
            -e npm_config_cache=/tmp/.npm \
            -v "$PWD":/app \
            -w /app \
            mcr.microsoft.com/playwright:v1.60.0-noble \
            npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore

      - name: Stop app
        if: always()
        run: docker stop tag-note-e2e || true
