# Production deployment: Caddy (auto-HTTPS) + TagNote.
#
# Copy to server at /opt/tagnote/docker-compose.yml alongside Caddyfile and .env.
#
# Required files:
#   .env       → JWT_SECRET=<openssl rand -hex 32>
#   Caddyfile  → see Caddyfile in this repo

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    # Caddy resolves {$TAGNOTE_DOMAIN} in the Caddyfile from its OWN container
    # environment. Without this, a recreated Caddy falls back to example.com.
    environment:
      - TAGNOTE_DOMAIN=${TAGNOTE_DOMAIN:?set TAGNOTE_DOMAIN in .env}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Drop-in directory for co-hosted sites (imported by Caddyfile).
      # Managed by other apps' deploy scripts; not touched by TagNote.
      - ./sites:/etc/caddy/sites:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - tagnote
      - tagnote-mcp
    networks:
      - default
      - monitoring

  tagnote:
    image: ${TAGNOTE_IMAGE:-tagnote:latest}
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - ./data:/data
    environment:
      - JWT_SECRET=${JWT_SECRET:?set JWT_SECRET in .env}
      - BASE_URL=https://${TAGNOTE_DOMAIN:?set TAGNOTE_DOMAIN in .env}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - APPLE_CLIENT_ID=${APPLE_CLIENT_ID:-}
      - APPLE_WEB_CLIENT_ID=${APPLE_WEB_CLIENT_ID:-}
      - APPLE_WEB_REDIRECT_URI=${APPLE_WEB_REDIRECT_URI:-}
      - TAGNOTE_ALERT_WEBHOOK=${TAGNOTE_ALERT_WEBHOOK:-}
      - OPERATIONAL_BEARER_TOKEN=${OPERATIONAL_BEARER_TOKEN:-}
      # Email configuration (SES takes priority over SMTP)
      - AWS_SES_ACCESS_KEY=${AWS_SES_ACCESS_KEY:-}
      - AWS_SES_SECRET_KEY=${AWS_SES_SECRET_KEY:-}
      - AWS_SES_REGION=${AWS_SES_REGION:-us-east-1}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@example.com}
      # Admin configuration
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
    security_opt:
      - no-new-privileges:true
    networks:
      - default
      - monitoring

  tagnote-mcp:
    image: ${TAGNOTE_IMAGE:-tagnote:latest}
    restart: unless-stopped
    entrypoint: ["tagnote-mcp"]
    command:
      - "-addr"
      - ":3001"
      - "-db"
      - "/data/tagnote.db"
      - "-uploads"
      - "/data/uploads"
      - "-public-url"
      - "https://mcp.${TAGNOTE_DOMAIN:?set TAGNOTE_DOMAIN in .env}"
    expose:
      - "3001"
    volumes:
      - ./data:/data
    environment:
      - JWT_SECRET=${JWT_SECRET:?set JWT_SECRET in .env}
      - BASE_URL=https://${TAGNOTE_DOMAIN:?set TAGNOTE_DOMAIN in .env}
      - TAGNOTE_MCP_ALLOW_DELETE=${TAGNOTE_MCP_ALLOW_DELETE:-0}
      - AWS_SES_ACCESS_KEY=${AWS_SES_ACCESS_KEY:-}
      - AWS_SES_SECRET_KEY=${AWS_SES_SECRET_KEY:-}
      - AWS_SES_REGION=${AWS_SES_REGION:-us-east-1}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@example.com}
    security_opt:
      - no-new-privileges:true
    networks:
      - default
      - monitoring

volumes:
  caddy-data:
  caddy-config:

networks:
  # Cross-project monitoring network (created by the monitoring stack). Declared
  # external so Caddy and TagNote keep it across container recreates — no more
  # imperative `docker network connect` needed after every deploy/recreate.
  monitoring:
    name: tagnote-network
    external: true
