services:
  tagnote:
    build: .
    ports:
      - "3777:3000"
    volumes:
      - tagnote-data:/data
    env_file:
      - path: .env
        required: false
    environment:
      - JWT_SECRET=${JWT_SECRET:-tagnote-dev-secret}
      - TAGNOTE_TEST_MODE=${TAGNOTE_TEST_MODE:-0}
      - TAGNOTE_ALLOW_DEV_SECRET=${TAGNOTE_ALLOW_DEV_SECRET:-1}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - APPLE_CLIENT_ID=${APPLE_CLIENT_ID:-}
      - APPLE_WEB_CLIENT_ID=${APPLE_WEB_CLIENT_ID:-}
      - APPLE_WEB_REDIRECT_URI=${APPLE_WEB_REDIRECT_URI:-}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - OPERATIONAL_BEARER_TOKEN=${OPERATIONAL_BEARER_TOKEN:-dev-operational-token}
      - TAGNOTE_DEV_BASE_URL=${TAGNOTE_DEV_BASE_URL:-http://localhost:3777}
      - TAGNOTE_DEV_PROXY_URL=${TAGNOTE_DEV_PROXY_URL:-http://localhost:3778}
      - TAGNOTE_GRAFANA_URL=${TAGNOTE_GRAFANA_URL:-http://localhost:3778/grafana/}
    restart: unless-stopped
    networks:
      - tagnote-dev

  tagnote-mcp:
    build: .
    entrypoint: ["tagnote-mcp"]
    command:
      - "-addr"
      - ":3001"
      - "-db"
      - "/data/tagnote.db"
      - "-uploads"
      - "/data/uploads"
      - "-public-url"
      - "http://localhost:3779"
    ports:
      - "3779:3001"
    volumes:
      - tagnote-data:/data
    env_file:
      - path: .env
        required: false
    environment:
      - JWT_SECRET=${JWT_SECRET:-tagnote-dev-secret}
      - TAGNOTE_TEST_MODE=${TAGNOTE_TEST_MODE:-0}
      - TAGNOTE_ALLOW_DEV_SECRET=${TAGNOTE_ALLOW_DEV_SECRET:-1}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - APPLE_CLIENT_ID=${APPLE_CLIENT_ID:-}
      - APPLE_WEB_CLIENT_ID=${APPLE_WEB_CLIENT_ID:-}
      - APPLE_WEB_REDIRECT_URI=${APPLE_WEB_REDIRECT_URI:-}
      - APPLE_MCP_REDIRECT_URI=${APPLE_MCP_REDIRECT_URI:-}
      - TAGNOTE_MCP_ALLOW_DELETE=${TAGNOTE_MCP_ALLOW_DELETE:-0}
    restart: unless-stopped
    networks:
      - tagnote-dev
    depends_on:
      - tagnote

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.106.1
    restart: unless-stopped
    volumes:
      - vm-data:/victoria-metrics-data
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/operational_token:/etc/prometheus/operational_token:ro
    command:
      - "-promscrape.config=/etc/prometheus/prometheus.yml"
      - "-retentionPeriod=30d"
    networks:
      - tagnote-dev

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_SERVER_ROOT_URL=http://localhost:3777/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    networks:
      - tagnote-dev
    depends_on:
      - victoriametrics

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "3778:80"
    volumes:
      - ./Caddyfile.dev:/etc/caddy/Caddyfile:ro
    networks:
      - tagnote-dev
    depends_on:
      - tagnote
      - tagnote-mcp
      - grafana

volumes:
  tagnote-data:
  vm-data:
  grafana-data:

networks:
  tagnote-dev:
